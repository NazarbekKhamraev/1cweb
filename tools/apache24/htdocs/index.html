<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard</title>
<style>
  :root {
    color-scheme: light;
    --surface-1:      #fcfcfb;
    --page-plane:     #f9f9f7;
    --sidebar-bg:     #f3f2ee;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --series-1:       #2a78d6;
    --series-2:       #eb6834;
    --diverging-pos:  #2a78d6;
    --diverging-neg:  #e34948;
    --good:           #006300;
    --critical:       #d03b3b;
    --tile-shadow:    0 1px 2px rgba(11,11,11,0.06), 0 1px 1px rgba(11,11,11,0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      color-scheme: dark;
      --surface-1: #1a1a19; --page-plane: #0d0d0d; --sidebar-bg: #151514;
      --text-primary: #ffffff; --text-secondary: #c3c2b7; --text-muted: #898781;
      --gridline: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
      --series-1: #3987e5; --series-2: #d95926;
      --diverging-pos: #3987e5; --diverging-neg: #e66767;
      --good: #0ca30c; --critical: #e66767;
    }
  }
  [data-theme="dark"] {
    color-scheme: dark;
    --surface-1: #1a1a19; --page-plane: #0d0d0d; --sidebar-bg: #151514;
    --text-primary: #ffffff; --text-secondary: #c3c2b7; --text-muted: #898781;
    --gridline: #2c2c2a; --baseline: #383835; --border: rgba(255,255,255,0.10);
    --series-1: #3987e5; --series-2: #d95926;
    --diverging-pos: #3987e5; --diverging-neg: #e66767;
    --good: #0ca30c; --critical: #e66767;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: var(--page-plane); color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  body { display: flex; min-height: 100vh; }

  .sidebar {
    width: 226px; flex: none; background: var(--sidebar-bg);
    border-right: 1px solid var(--border); padding: 16px 10px;
    display: flex; flex-direction: column; gap: 2px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar .brand { font-size: 15px; font-weight: 700; padding: 4px 10px 14px; }
  .sidebar .brand .sub { display: block; font-size: 11px; font-weight: 400; color: var(--text-muted); margin-top: 2px; }
  .menu-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px;
    color: var(--text-secondary); text-decoration: none; font-size: 13.5px; font-weight: 550;
    cursor: pointer; user-select: none;
  }
  .menu-item .ico { width: 18px; text-align: center; font-size: 14px; }
  .menu-item:hover { background: var(--gridline); color: var(--text-primary); }
  .menu-item.active { background: var(--series-1); color: #fff; }

  .sidebar-foot { margin-top: auto; padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; }

  .main { flex: 1; min-width: 0; padding: 20px 24px 64px; }
  .page { display: none; }
  .page.active { display: block; }

  header.top {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; flex-wrap: wrap; margin-bottom: 16px;
  }
  header.top h1 { font-size: 19px; font-weight: 650; margin: 0; }
  header.top .sub { color: var(--text-secondary); font-size: 12.5px; margin-top: 2px; }

  .btn {
    appearance: none; border: 1px solid var(--border); background: var(--surface-1);
    color: var(--text-primary); border-radius: 8px; padding: 7px 12px;
    font-size: 13px; font-weight: 550; cursor: pointer; font-family: inherit;
  }
  .btn:hover { background: var(--gridline); }
  .btn.primary { background: var(--series-1); color: #fff; border-color: transparent; }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.small { padding: 4px 9px; font-size: 12px; }
  .icon-btn {
    appearance: none; border: 1px solid var(--border); background: var(--surface-1);
    color: var(--text-secondary); border-radius: 8px; min-width: 32px; height: 32px;
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; padding: 0 8px;
  }
  .icon-btn:hover { background: var(--gridline); }

  .lang-group {
    display: inline-flex; border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; height: 32px;
  }
  .lang-btn {
    appearance: none; border: none; background: var(--surface-1); color: var(--text-secondary);
    font-family: inherit; font-size: 11.5px; font-weight: 700; padding: 0 10px; cursor: pointer;
    border-left: 1px solid var(--border);
  }
  .lang-btn:first-child { border-left: none; }
  .lang-btn:hover { background: var(--gridline); }
  .lang-btn.active { background: var(--series-1); color: #fff; }

  .filters {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 12px; margin-bottom: 18px;
    box-shadow: var(--tile-shadow);
  }
  .filters label { font-size: 12px; color: var(--text-secondary); margin-right: 4px; }
  .filters input[type="date"], .filters input[type="month"] {
    font-family: inherit; font-size: 13px; padding: 5px 7px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--page-plane); color: var(--text-primary);
  }
  .filters .preset-row { display: flex; gap: 4px; }
  .filters .preset-row .btn.active { background: var(--series-1); color: #fff; border-color: transparent; }
  .filters .spacer { flex: 1; }

  .kpi-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; margin-bottom: 18px;
  }
  .tile {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; box-shadow: var(--tile-shadow);
  }
  .tile .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
  .tile .value { font-size: 23px; font-weight: 650; letter-spacing: -0.01em; }
  .tile .value.good { color: var(--good); }
  .tile .value.critical { color: var(--critical); }
  .tile .note { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .card {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; margin-bottom: 18px; box-shadow: var(--tile-shadow);
  }
  .card .card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px; gap: 8px; flex-wrap: wrap;
  }
  .card h2 { font-size: 14px; font-weight: 650; margin: 0; }
  .card .card-sub { font-size: 12px; color: var(--text-muted); margin: 2px 0 12px; }
  .legend { display: flex; gap: 14px; font-size: 12px; color: var(--text-secondary); }
  .legend .key { display: inline-flex; align-items: center; gap: 5px; }
  .legend .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

  .chart-wrap { position: relative; }
  svg.chart { display: block; width: 100%; height: auto; overflow: visible; }
  .bar { transition: opacity .1s; }
  .bar:hover { opacity: 0.82; }
  .axis-label { fill: var(--text-muted); font-size: 10px; }
  .grid-line { stroke: var(--gridline); stroke-width: 1; }
  .baseline-line { stroke: var(--baseline); stroke-width: 1; }

  .tooltip {
    position: absolute; pointer-events: none; background: var(--text-primary);
    color: var(--surface-1); font-size: 12px; padding: 6px 9px; border-radius: 7px;
    transform: translate(-50%, -100%); white-space: nowrap; z-index: 5;
    opacity: 0; transition: opacity .08s; box-shadow: 0 4px 12px rgba(0,0,0,.2);
  }
  .tooltip.show { opacity: 1; }
  .tooltip .t-val { font-weight: 650; }

  table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data-table th, table.data-table td {
    text-align: right; padding: 6px 8px; border-bottom: 1px solid var(--gridline);
    font-variant-numeric: tabular-nums;
  }
  table.data-table th:first-child, table.data-table td:first-child { text-align: left; font-variant-numeric: normal; }
  table.data-table th { color: var(--text-muted); font-weight: 550; font-size: 11px; }

  .table-toggle-wrap { display: none; margin-top: 10px; }
  .table-toggle-wrap.show { display: block; }

  .seg-group {
    display: inline-flex; border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; height: 30px; flex: none;
  }
  .seg-btn {
    appearance: none; border: none; background: var(--surface-1); color: var(--text-secondary);
    font-family: inherit; font-size: 12px; font-weight: 600; padding: 0 12px; cursor: pointer;
    border-left: 1px solid var(--border);
  }
  .seg-btn:first-child { border-left: none; }
  .seg-btn:hover { background: var(--gridline); }
  .seg-btn.active { background: var(--series-1); color: #fff; }

  .period-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 12px; flex-wrap: wrap;
  }
  .period-row .month-pick {
    font-family: inherit; font-size: 13px; padding: 5px 7px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--page-plane); color: var(--text-primary);
  }
  .period-row .month-pick.hide { display: none; }

  .month-picker { position: relative; display: inline-block; }
  .month-picker-btn {
    appearance: none; font-family: inherit; font-size: 13px; padding: 5px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--page-plane); color: var(--text-primary); cursor: pointer;
  }
  .month-picker-btn:hover { background: var(--gridline); }
  .month-picker-popup {
    display: none; position: absolute; top: calc(100% + 6px); left: 0; z-index: 30;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px; box-shadow: 0 12px 32px rgba(0,0,0,.18); width: 220px;
  }
  .month-picker-popup.show { display: block; }
  .month-picker-popup.wide { width: 260px; left: auto; right: 0; }
  .mpp-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; padding: 0 2px;
  }
  .mpp-head .mpp-year { font-size: 13px; font-weight: 650; }
  .mpp-nav {
    appearance: none; border: 1px solid var(--border); background: var(--page-plane); color: var(--text-primary);
    border-radius: 6px; width: 26px; height: 26px; cursor: pointer; font-size: 14px; line-height: 1;
  }
  .mpp-nav:hover { background: var(--gridline); }
  .rp-tabs { display: flex; width: 100%; margin-bottom: 8px; }
  .rp-tabs .seg-btn { flex: 1; padding: 5px 4px; font-size: 11px; }
  .mpp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
  .mpp-cell {
    appearance: none; border: 1px solid transparent; background: transparent; color: var(--text-primary);
    border-radius: 7px; padding: 7px 4px; font-size: 12.5px; font-family: inherit; cursor: pointer; text-align: center;
  }
  .mpp-cell:hover { background: var(--gridline); }
  .mpp-cell.active { background: var(--series-1); color: #fff; }

  .table-scroll { overflow-x: auto; margin-top: 4px; }
  .table-scroll table.data-table { min-width: 900px; }
  table.data-table tfoot td {
    font-weight: 700; border-top: 2px solid var(--border); border-bottom: none;
    color: var(--text-primary); font-variant-numeric: tabular-nums;
  }
  table.data-table tfoot td:first-child { font-variant-numeric: normal; }

  .empty { color: var(--text-muted); font-size: 13px; padding: 24px 0; text-align: center; }
  .data-note { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
  .err-banner {
    background: var(--critical); color: #fff; border-radius: 10px; padding: 10px 14px;
    font-size: 13px; margin-bottom: 16px; display: none;
  }
  .err-banner.show { display: block; }

  .settings-panel {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
    align-items: center; justify-content: center; z-index: 50;
  }
  .settings-panel.show { display: flex; }
  .settings-box {
    background: var(--surface-1); border-radius: 14px; padding: 20px; width: 340px;
    max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .settings-box h3 { margin: 0 0 14px; font-size: 15px; }
  .settings-box label { display: block; font-size: 12px; color: var(--text-secondary); margin: 10px 0 4px; }
  .settings-box input {
    width: 100%; font-family: inherit; font-size: 13px; padding: 7px 9px;
    border-radius: 7px; border: 1px solid var(--border); background: var(--page-plane);
    color: var(--text-primary);
  }
  .settings-box .row-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

  .sidebar-toggle { display: none; }
  @media (max-width: 860px) {
    .sidebar {
      position: fixed; left: 0; top: 0; z-index: 40; transform: translateX(-100%);
      transition: transform .18s;
    }
    .sidebar.open { transform: translateX(0); box-shadow: 0 0 0 2000px rgba(0,0,0,.35); }
    .sidebar-toggle { display: inline-flex; }
    .main { padding: 16px 14px 48px; }
  }
  @media (max-width: 520px) {
    .filters { flex-direction: column; align-items: stretch; }
    .filters .spacer { display: none; }
  }
</style>
</head>
<body>

<nav class="sidebar" id="sidebar">
  <div class="brand">Dashboard<span class="sub" data-i18n="brand_sub"></span></div>

  <a class="menu-item" data-page="bank"><span class="ico">&#127974;</span><span data-i18n="nav_bank"></span></a>
  <a class="menu-item" data-page="sotuv"><span class="ico">&#128176;</span><span data-i18n="nav_sotuv"></span></a>
  <a class="menu-item" data-page="xaridlar"><span class="ico">&#128722;</span><span data-i18n="nav_xaridlar"></span></a>
  <a class="menu-item" data-page="sklad"><span class="ico">&#128230;</span><span data-i18n="nav_sklad"></span></a>
  <a class="menu-item" data-page="ishlab"><span class="ico">&#127981;</span><span data-i18n="nav_ishlab"></span></a>
  <a class="menu-item" data-page="vositalar"><span class="ico">&#128666;</span><span data-i18n="nav_vositalar"></span></a>
  <a class="menu-item" data-page="zarplata"><span class="ico">&#128101;</span><span data-i18n="nav_zarplata"></span></a>
  <a class="menu-item" data-page="hisobotlar"><span class="ico">&#128202;</span><span data-i18n="nav_hisobotlar"></span></a>
</nav>

<div class="main">

  <header class="top">
    <div style="display:flex; align-items:center; gap:10px;">
      <button class="icon-btn sidebar-toggle" id="sidebarToggle">&#9776;</button>
      <div>
        <h1 id="pageTitle">—</h1>
        <div class="sub" id="pageSub">—</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:8px;">
      <button class="icon-btn" id="themeToggle" title="Theme">&#9680;</button>
      <div class="lang-group" id="langGroup">
        <button class="lang-btn" data-lang="uz">UZ</button>
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <button class="icon-btn" id="settingsBtn" title="Settings">&#9881;</button>
      <button class="btn primary" id="refreshBtn" data-i18n="btn_refresh"></button>
    </div>
  </header>

  <div class="err-banner" id="errBanner"></div>

  <div class="filters">
    <label data-i18n="filter_period"></label>
    <div class="preset-row" id="presetRow">
      <button class="btn small" data-preset="7" data-i18n="preset_7"></button>
      <button class="btn small active" data-preset="30" data-i18n="preset_30"></button>
      <button class="btn small" data-preset="90" data-i18n="preset_90"></button>
    </div>
    <input type="date" id="dateFrom">
    <span style="color:var(--text-muted); font-size:12px;">—</span>
    <input type="date" id="dateTo">
    <div class="spacer"></div>
    <label data-i18n="filter_report_period"></label>
    <div class="month-picker" id="reportPeriodPicker">
      <button type="button" class="month-picker-btn"></button>
      <div class="month-picker-popup wide">
        <div class="mpp-head">
          <button type="button" class="mpp-nav" data-dir="-1">&#8249;</button>
          <span class="mpp-year"></span>
          <button type="button" class="mpp-nav" data-dir="1">&#8250;</button>
        </div>
        <div class="seg-group rp-tabs">
          <button type="button" class="seg-btn active" data-rp-type="month" data-i18n="rp_month"></button>
          <button type="button" class="seg-btn" data-rp-type="quarter" data-i18n="rp_quarter"></button>
          <button type="button" class="seg-btn" data-rp-type="half" data-i18n="rp_half"></button>
          <button type="button" class="seg-btn" data-rp-type="year" data-i18n="rp_year"></button>
        </div>
        <div class="mpp-grid" id="rpGrid"></div>
      </div>
    </div>
  </div>

  <!-- ===================== BANK ===================== -->
  <section class="page" id="page-bank">
    <div class="kpi-row">
      <div class="tile"><div class="label" data-i18n="kpi_inflow"></div><div class="value good" id="bankInflow">—</div></div>
      <div class="tile"><div class="label" data-i18n="kpi_outflow"></div><div class="value critical" id="bankOutflow">—</div></div>
      <div class="tile"><div class="label" data-i18n="kpi_netflow"></div><div class="value" id="bankNet">—</div></div>
    </div>
    <div class="card">
      <div class="card-head">
        <div><h2 data-i18n="bank_flow_title"></h2><div class="card-sub" id="bankFlowSub">&nbsp;</div></div>
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="legend">
            <span class="key"><span class="swatch" style="background:var(--series-1)"></span><span data-i18n="legend_inflow"></span></span>
            <span class="key"><span class="swatch" style="background:var(--series-2)"></span><span data-i18n="legend_outflow"></span></span>
          </div>
          <button class="btn small" data-toggle="bankFlowTableWrap" data-i18n="btn_table"></button>
        </div>
      </div>
      <div class="chart-wrap" id="bankFlowWrap"></div>
      <div class="table-toggle-wrap" id="bankFlowTableWrap"></div>
    </div>
    <div class="card">
      <div class="card-head"><div><h2 data-i18n="bank_balance_title"></h2></div></div>
      <div class="chart-wrap" id="bankWrap"></div>
    </div>
  </section>

  <!-- ===================== SOTUV ===================== -->
  <section class="page" id="page-sotuv">
    <div class="kpi-row">
      <div class="tile"><div class="label" data-i18n="kpi_total_sales"></div><div class="value" id="sotuvTotal">—</div></div>
      <div class="tile"><div class="label" data-i18n="kpi_docs_count"></div><div class="value" id="sotuvDocs">—</div></div>
      <div class="tile"><div class="label" data-i18n="kpi_avg_daily"></div><div class="value" id="sotuvAvg">—</div></div>
    </div>
    <div class="card">
      <div class="card-head">
        <div><h2 data-i18n="nav_sotuv"></h2><div class="card-sub" id="sotuvChartSub">&nbsp;</div></div>
        <div class="seg-group view-switch" data-page="sotuv">
          <button class="seg-btn active" data-view="chart" data-i18n="btn_chart"></button>
          <button class="seg-btn" data-view="table" data-i18n="btn_table"></button>
        </div>
      </div>
      <div class="period-row" data-page="sotuv">
        <div class="seg-group period-switch">
          <button class="seg-btn active" data-period="day" data-i18n="period_day"></button>
          <button class="seg-btn" data-period="month" data-i18n="period_month"></button>
        </div>
        <input type="month" class="month-pick hide" id="sotuvMonthPick">
      </div>
      <div class="chart-wrap" id="sotuvChartWrap"></div>
      <div class="table-toggle-wrap" id="sotuvTableWrap"></div>
    </div>
    <div class="data-note" data-i18n="note_sotuv"></div>
  </section>

  <!-- ===================== XARIDLAR ===================== -->
  <section class="page" id="page-xaridlar">
    <div class="kpi-row">
      <div class="tile"><div class="label" data-i18n="kpi_total_purchase"></div><div class="value" id="xaridTotal">—</div></div>
      <div class="tile"><div class="label" data-i18n="kpi_docs_count"></div><div class="value" id="xaridDocs">—</div></div>
      <div class="tile"><div class="label" data-i18n="kpi_avg_daily"></div><div class="value" id="xaridAvg">—</div></div>
    </div>
    <div class="card">
      <div class="card-head">
        <div><h2 data-i18n="nav_xaridlar"></h2><div class="card-sub" id="xaridChartSub">&nbsp;</div></div>
        <div class="seg-group view-switch" data-page="xaridlar">
          <button class="seg-btn active" data-view="chart" data-i18n="btn_chart"></button>
          <button class="seg-btn" data-view="table" data-i18n="btn_table"></button>
        </div>
      </div>
      <div class="period-row" data-page="xaridlar">
        <div class="seg-group period-switch">
          <button class="seg-btn active" data-period="day" data-i18n="period_day"></button>
          <button class="seg-btn" data-period="month" data-i18n="period_month"></button>
        </div>
        <input type="month" class="month-pick hide" id="xaridlarMonthPick">
      </div>
      <div class="chart-wrap" id="xaridChartWrap"></div>
      <div class="table-toggle-wrap" id="xaridTableWrap"></div>
    </div>
    <div class="data-note" data-i18n="note_xaridlar"></div>
  </section>

  <!-- ===================== SKLAD ===================== -->
  <section class="page" id="page-sklad">
    <div class="card">
      <div class="card-head"><div><h2 data-i18n="nav_sklad"></h2><div class="card-sub">10, 41, 43, 45</div></div></div>

    uz: ["Yanvar", "Fevral", "Mart", "Aprel", "May", "Iyun", "Iyul", "Avgust", "Sentabr", "Oktabr", "Noyabr", "Dekabr"],
    ru: ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"],
    en: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"]
  };
  var monthPickerRefreshers = [];

  var lang = localStorage.getItem("dashboardLang") || "uz";
  function t(key) { return (DICT[lang] && DICT[lang][key]) || key; }
  function applyI18n() {
    document.documentElement.setAttribute("lang", lang);
    document.querySelectorAll("[data-i18n]").forEach(function (el) {
      el.textContent = t(el.getAttribute("data-i18n"));
    });
    document.querySelectorAll(".lang-btn").forEach(function (b) {
      b.classList.toggle("active", b.getAttribute("data-lang") === lang);
    });
    monthPickerRefreshers.forEach(function (fn) { fn(); });
  }
  document.getElementById("langGroup").addEventListener("click", function (e) {
    var btn = e.target.closest(".lang-btn");
    if (!btn) return;
    lang = btn.getAttribute("data-lang");
    localStorage.setItem("dashboardLang", lang);
    applyI18n();
    updateHeader(currentPage());
    if (cache.sales) renderPage(currentPage());
  });

  // ================= cfg =================
  var LS_KEY = "dashboardCfg";
  function defaultCfg() {
    // 1C server always runs locally on the operator's machine, regardless of where
    // this dashboard page itself is hosted (Apache htdocs, Netlify, etc.) — so
    // "localhost" here always resolves to the viewer's own machine, not the host.
    return { base: "http://localhost:8081/test1/hs/dashboard", user: "", pass: "" };
  }
  function loadCfg() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (raw) {
        var c = Object.assign(defaultCfg(), JSON.parse(raw));
        // self-heal a base saved by an older build that derived it from location.origin
        // (always wrong once this dashboard is hosted somewhere other than the 1C server itself)
        if (!/^https?:\/\/localhost(:\d+)?\//i.test(c.base)) c.base = defaultCfg().base;
        return c;
      }
    } catch (e) {}
    return defaultCfg();
  }
  function saveCfg(c) { localStorage.setItem(LS_KEY, JSON.stringify(c)); }
  var cfg = loadCfg();

  // ================= theme =================
  function applyTheme(tval) {
    if (tval) document.documentElement.setAttribute("data-theme", tval);
    else document.documentElement.removeAttribute("data-theme");
  }
  applyTheme(localStorage.getItem("dashboardTheme") || "");
  document.getElementById("themeToggle").addEventListener("click", function () {
    var cur = document.documentElement.getAttribute("data-theme");
    var next = cur === "dark" ? "light" : (cur === "light" ? "" : "dark");
    applyTheme(next);
    localStorage.setItem("dashboardTheme", next);
  });

  // ================= sidebar (mobile) =================
  var sidebar = document.getElementById("sidebar");
  document.getElementById("sidebarToggle").addEventListener("click", function () { sidebar.classList.toggle("open"); });

  // ================= settings modal =================
  var settingsPanel = document.getElementById("settingsPanel");
  document.getElementById("settingsBtn").addEventListener("click", function () {
    document.getElementById("cfgBase").value = cfg.base;
    document.getElementById("cfgUser").value = cfg.user;
    document.getElementById("cfgPass").value = cfg.pass;
    settingsPanel.classList.add("show");
  });
  document.getElementById("settingsCancel").addEventListener("click", function () { settingsPanel.classList.remove("show"); });
  document.getElementById("settingsSave").addEventListener("click", function () {
    cfg.base = document.getElementById("cfgBase").value.trim() || defaultCfg().base;
    cfg.user = document.getElementById("cfgUser").value.trim();
    cfg.pass = document.getElementById("cfgPass").value;
    saveCfg(cfg);
    settingsPanel.classList.remove("show");
    loadAll();
  });

  // ================= routing =================
  var PAGES = ["bank", "sotuv", "xaridlar", "sklad", "ishlab", "vositalar", "zarplata", "hisobotlar"];
  function currentPage() {
    var h = window.location.hash.replace("#", "");
    return PAGES.indexOf(h) >= 0 ? h : "bank";
  }
  function updateHeader(name) {
    document.getElementById("pageTitle").textContent = t("nav_" + name);
    document.getElementById("pageSub").textContent = t("sub_" + name);
  }
  function setActivePage(name) {
    if (PAGES.indexOf(name) < 0) name = "bank";
    document.querySelectorAll(".page").forEach(function (p) { p.classList.remove("active"); });
    document.querySelectorAll(".menu-item").forEach(function (m) { m.classList.remove("active"); });
    var pageEl = document.getElementById("page-" + name);
    if (pageEl) pageEl.classList.add("active");
    var menuEl = document.querySelector('.menu-item[data-page="' + name + '"]');
    if (menuEl) menuEl.classList.add("active");
    updateHeader(name);
    sidebar.classList.remove("open");
    if (cache.sales) renderPage(name);
  }
  document.querySelectorAll(".menu-item").forEach(function (m) {
    m.addEventListener("click", function () { window.location.hash = m.getAttribute("data-page"); });
  });
  window.addEventListener("hashchange", function () { setActivePage(currentPage()); });

  // ================= date helpers =================
  function fmtDate(d) { return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); }
  function fmtDateDMY(iso) { var p = iso.split("-"); return p[2] + "." + p[1] + "." + p[0]; }
  function fmtAxisDM(iso, includeYear) {
    var p = iso.split("-");
    return includeYear ? (p[2] + "." + p[1] + "." + p[0].slice(2)) : (p[2] + "." + p[1]);
  }
  function spansMultipleYears(dates) {
    return dates.length > 0 && dates[0].slice(0, 4) !== dates[dates.length - 1].slice(0, 4);
  }
  function today() { return new Date(); }
  function daysAgo(n) { var d = new Date(); d.setDate(d.getDate() - n); return d; }

  var dateFromEl = document.getElementById("dateFrom");
  var dateToEl = document.getElementById("dateTo");

  dateToEl.value = fmtDate(today());
  dateFromEl.value = fmtDate(daysAgo(29));
  var nowD = today();
  var defaultYM = nowD.getFullYear() + "-" + String(nowD.getMonth() + 1).padStart(2, "0");
  document.getElementById("sotuvMonthPick").value = defaultYM;
  document.getElementById("xaridlarMonthPick").value = defaultYM;

  // ================= report period (month / quarter / half-year / year) — drives Hisobotlar + balance snapshot =================
  var reportPeriod = { type: "month", year: nowD.getFullYear(), index: nowD.getMonth() + 1 };

  function reportPeriodBounds() {
    var y = reportPeriod.year;
    if (reportPeriod.type === "month") {
      var m = reportPeriod.index;
      return { from: fmtDate(new Date(y, m - 1, 1)), to: fmtDate(new Date(y, m, 0)) };
    }
    if (reportPeriod.type === "quarter") {
      var qm = (reportPeriod.index - 1) * 3;
      return { from: fmtDate(new Date(y, qm, 1)), to: fmtDate(new Date(y, qm + 3, 0)) };
    }
    if (reportPeriod.type === "half") {
      var hm = (reportPeriod.index - 1) * 6;
      return { from: fmtDate(new Date(y, hm, 1)), to: fmtDate(new Date(y, hm + 6, 0)) };
    }
    return { from: fmtDate(new Date(y, 0, 1)), to: fmtDate(new Date(y, 11, 31)) };
  }
  function reportPeriodLabel() {
    var y = reportPeriod.year;
    if (reportPeriod.type === "month") return MONTH_NAMES[lang][reportPeriod.index - 1] + " " + y;
    if (reportPeriod.type === "quarter") return t("rp_quarter") + " " + reportPeriod.index + " · " + y;
    if (reportPeriod.type === "half") return t("rp_half") + " " + reportPeriod.index + " · " + y;
    return String(y);
  }

  function setupReportPeriodPicker() {
    var wrapEl = document.getElementById("reportPeriodPicker");
    var btn = wrapEl.querySelector(".month-picker-btn");
    var popup = wrapEl.querySelector(".month-picker-popup");
    var yearLbl = wrapEl.querySelector(".mpp-year");
    var grid = wrapEl.querySelector("#rpGrid");
    var tabsWrap = wrapEl.querySelector(".rp-tabs");
    var viewYear = reportPeriod.year;
    var viewType = reportPeriod.type;

    function renderBtn() { btn.textContent = reportPeriodLabel(); }

    function addCell(label, idx) {
      var isActive = viewType === reportPeriod.type && viewYear === reportPeriod.year && idx === reportPeriod.index;
      var cell = document.createElement("button");
      cell.type = "button";
      cell.className = "mpp-cell" + (isActive ? " active" : "");
      cell.textContent = label;
      cell.addEventListener("click", function () {
        reportPeriod = { type: viewType, year: viewYear, index: idx };
        popup.classList.remove("show");
        renderBtn();
        loadAll();
      });
      grid.appendChild(cell);
    }
    function renderGrid() {
      yearLbl.textContent = viewYear;
      grid.innerHTML = "";
      if (viewType === "month") {
        grid.style.gridTemplateColumns = "repeat(3, 1fr)";
        for (var m = 1; m <= 12; m++) addCell(MONTH_NAMES[lang][m - 1], m);
      } else if (viewType === "quarter") {
        grid.style.gridTemplateColumns = "repeat(2, 1fr)";
        for (var q = 1; q <= 4; q++) addCell(t("rp_quarter") + " " + q, q);
      } else if (viewType === "half") {
        grid.style.gridTemplateColumns = "repeat(2, 1fr)";
        for (var h = 1; h <= 2; h++) addCell(t("rp_half") + " " + h, h);
      } else {
        grid.style.gridTemplateColumns = "repeat(1, 1fr)";
        addCell(String(viewYear), 1);
      }
    }
    tabsWrap.addEventListener("click", function (e) {
      var b = e.target.closest(".seg-btn");
      if (!b) return;
      viewType = b.getAttribute("data-rp-type");
      tabsWrap.querySelectorAll(".seg-btn").forEach(function (x) { x.classList.remove("active"); });
      b.classList.add("active");
      renderGrid();

  function money(n) {
    n = Number(n) || 0;
    var abs = Math.abs(n), sign = n < 0 ? "-" : "", s;
    if (abs >= 1e9) s = (abs / 1e9).toFixed(2).replace(/\.00$/, "") + " " + t("unit_bln");
    else if (abs >= 1e6) s = (abs / 1e6).toFixed(2).replace(/\.00$/, "") + " " + t("unit_mln");
    else if (abs >= 1e3) s = (abs / 1e3).toFixed(1).replace(/\.0$/, "") + " " + t("unit_ming");
    else s = abs.toFixed(0);
    return sign + s + " " + t("unit_som");
  }
  function moneyFull(n) { n = Number(n) || 0; return n.toLocaleString("ru-RU") + " " + t("unit_som"); }

  function niceMax(v) {

    var mag = Math.pow(10, Math.floor(Math.log10(v)));
    var n = v / mag;
    var step = n <= 1 ? 1 : n <= 2 ? 2 : n <= 5 ? 5 : 10;
    return step * mag;
  }

  // ================= single-series day bar chart =================
  function renderDayChart(wrapId, subId, tableId, seriesName, color, days) {
    var wrap = document.getElementById(wrapId);
    wrap.innerHTML = "";
    var dates = days.map(function (d) { return d.date; }).sort();
    if (dates.length === 0) {
      wrap.innerHTML = '<div class="empty">' + t("empty_period") + '</div>';
      renderTable(tableId, ["—", seriesName], []);
      return;
    }
    var dayMap = {};
    days.forEach(function (d) { dayMap[d.date] = d.amount; });
    var multiYear = spansMultipleYears(dates);

    var W = 1000, H = 260, padL = 46, padR = 10, padT = 14, padB = 30;
    var plotW = W - padL - padR, plotH = H - padT - padB;
    var maxVal = niceMax(Math.max.apply(null, dates.map(function (d) { return dayMap[d] || 0; }).concat([1])));

    var svg = svgEl("svg", { class: "chart", viewBox: "0 0 " + W + " " + H, preserveAspectRatio: "xMidYMid meet" });
    var steps = 4;
    for (var s = 0; s <= steps; s++) {
      var gy = padT + plotH - (plotH * s / steps);
      svg.appendChild(svgEl("line", { class: s === 0 ? "baseline-line" : "grid-line", x1: padL, x2: W - padR, y1: gy, y2: gy }));
      var lbl = svgEl("text", { class: "axis-label", x: padL - 6, y: gy + 3, "text-anchor": "end" });
      lbl.textContent = money(maxVal * s / steps).replace(" " + t("unit_som"), "");
      svg.appendChild(lbl);
    }

    var groupW = plotW / dates.length;
    var barW = Math.min(26, groupW * 0.5);

    dates.forEach(function (d, i) {
      var gx = padL + groupW * i + groupW / 2;
      var v = dayMap[d] || 0;
      var h = plotH * (v / maxVal);
      var baseY = padT + plotH;
      svg.appendChild(svgEl("rect", { class: "bar", x: gx - barW / 2, y: baseY - h, width: barW, height: Math.max(h, v > 0 ? 1 : 0), rx: 3, fill: color }));
      var hit = svgEl("rect", { x: gx - groupW / 2, y: padT, width: groupW, height: plotH, fill: "transparent" });
      hit.addEventListener("pointermove", function (e) {
        showTooltip(e.pageX, e.pageY, '<div>' + fmtDateDMY(d) + '</div><div><span class="t-val">' + moneyFull(v) + '</span></div>');
      });
      hit.addEventListener("pointerleave", hideTooltip);
      svg.appendChild(hit);
      if (dates.length <= 14 || i % Math.ceil(dates.length / 10) === 0) {
        var xlbl = svgEl("text", { class: "axis-label", x: gx, y: H - 8, "text-anchor": "middle" });
        xlbl.textContent = fmtAxisDM(d, multiYear);
        svg.appendChild(xlbl);
      }
    });
    wrap.appendChild(svg);

    if (subId) {
      var total = dates.reduce(function (a, d) { return a + (dayMap[d] || 0); }, 0);
      document.getElementById(subId).textContent = dates.length + " " + t("days_word") + " · " + moneyFull(total);
    }
    renderTable(tableId, ["—", seriesName], dates.map(function (d) { return [fmtDateDMY(d), moneyFull(dayMap[d] || 0)]; }));
  }

  // ================= two-series flow chart (inflow / outflow) — bars for few days, lines for many =================
  function renderFlowChart(wrapId, subId, tableId, days) {
    var wrap = document.getElementById(wrapId);
    wrap.innerHTML = "";
    var dates = days.map(function (d) { return d.date; }).sort();
    if (dates.length === 0) {
      wrap.innerHTML = '<div class="empty">' + t("empty_period") + '</div>';
      renderTable(tableId, ["—", t("legend_inflow"), t("legend_outflow")], []);
      return;
    }
    var dayMap = {};
    days.forEach(function (d) { dayMap[d.date] = d; });
    var multiYear = spansMultipleYears(dates);

    var W = 1000, H = 260, padL = 46, padR = 10, padT = 14, padB = 30;
    var plotW = W - padL - padR, plotH = H - padT - padB;
    var maxVal = niceMax(Math.max.apply(null, dates.map(function (d) {
      return Math.max(dayMap[d].inflow || 0, dayMap[d].outflow || 0);
    }).concat([1])));

    var svg = svgEl("svg", { class: "chart", viewBox: "0 0 " + W + " " + H, preserveAspectRatio: "xMidYMid meet" });
    var steps = 4;
    for (var s = 0; s <= steps; s++) {
      var gy = padT + plotH - (plotH * s / steps);
      svg.appendChild(svgEl("line", { class: s === 0 ? "baseline-line" : "grid-line", x1: padL, x2: W - padR, y1: gy, y2: gy }));
      var lbl = svgEl("text", { class: "axis-label", x: padL - 6, y: gy + 3, "text-anchor": "end" });
      lbl.textContent = money(maxVal * s / steps).replace(" " + t("unit_som"), "");
      svg.appendChild(lbl);
    }

    var useLines = dates.length > 60;
    var baseY = padT + plotH;

    if (useLines) {
      var stepX = dates.length > 1 ? plotW / (dates.length - 1) : 0;
      var xAt = function (i) { return padL + stepX * i; };
      var yAt = function (v) { return baseY - plotH * (v / maxVal); };

      [{ key: "inflow", color: "var(--series-1)" }, { key: "outflow", color: "var(--series-2)" }].forEach(function (s) {
        var d = "";
        dates.forEach(function (dt, i) {
          var v = dayMap[dt][s.key] || 0;
          d += (i === 0 ? "M " : "L ") + xAt(i) + " " + yAt(v) + " ";
        });
        svg.appendChild(svgEl("path", { d: d, fill: "none", stroke: s.color, "stroke-width": 2, "stroke-linejoin": "round", "stroke-linecap": "round" }));
      });

      var crosshair = svgEl("line", { class: "grid-line", x1: 0, x2: 0, y1: padT, y2: baseY, style: "display:none; stroke: var(--text-muted);" });
      svg.appendChild(crosshair);

      var hit = svgEl("rect", { x: padL, y: padT, width: plotW, height: plotH, fill: "transparent" });
      hit.addEventListener("pointermove", function (e) {
        var rectBounds = svg.getBoundingClientRect();
        var relX = (e.clientX - rectBounds.left) * (W / rectBounds.width);
        var i = Math.round((relX - padL) / (stepX || 1));
        i = Math.max(0, Math.min(dates.length - 1, i));
        var dt = dates[i];
        crosshair.setAttribute("x1", xAt(i)); crosshair.setAttribute("x2", xAt(i));
        crosshair.style.display = "";
        showTooltip(e.pageX, e.pageY,
          '<div>' + fmtDateDMY(dt) + '</div>' +
          '<div><span class="t-val">' + moneyFull(dayMap[dt].inflow || 0) + '</span> — ' + t("legend_inflow") + '</div>' +
          '<div><span class="t-val">' + moneyFull(dayMap[dt].outflow || 0) + '</span> — ' + t("legend_outflow") + '</div>');
      });
      hit.addEventListener("pointerleave", function () { crosshair.style.display = "none"; hideTooltip(); });
      svg.appendChild(hit);

      var labelEvery = Math.ceil(dates.length / 8);
      dates.forEach(function (dt, i) {
        if (i % labelEvery === 0 || i === dates.length - 1) {
          var xlbl = svgEl("text", { class: "axis-label", x: xAt(i), y: H - 8, "text-anchor": "middle" });
          xlbl.textContent = fmtAxisDM(dt, multiYear);
          svg.appendChild(xlbl);
        }
      });
    } else {
      var groupW = plotW / dates.length;
      var barW = Math.min(16, groupW * 0.32);
      var gap = 2;

      dates.forEach(function (d, i) {
        var gx = padL + groupW * i + groupW / 2;
        var row = dayMap[d];
        var vIn = row.inflow || 0, vOut = row.outflow || 0;
        var hIn = plotH * (vIn / maxVal), hOut = plotH * (vOut / maxVal);

        svg.appendChild(svgEl("rect", { class: "bar", x: gx - barW - gap / 2, y: baseY - hIn, width: barW, height: Math.max(hIn, vIn > 0 ? 1 : 0), rx: 3, fill: "var(--series-1)" }));
        svg.appendChild(svgEl("rect", { class: "bar", x: gx + gap / 2, y: baseY - hOut, width: barW, height: Math.max(hOut, vOut > 0 ? 1 : 0), rx: 3, fill: "var(--series-2)" }));

        var hit = svgEl("rect", { x: gx - groupW / 2, y: padT, width: groupW, height: plotH, fill: "transparent" });
        hit.addEventListener("pointermove", function (e) {
          showTooltip(e.pageX, e.pageY,
            '<div>' + fmtDateDMY(d) + '</div>' +
            '<div><span class="t-val">' + moneyFull(vIn) + '</span> — ' + t("legend_inflow") + '</div>' +
            '<div><span class="t-val">' + moneyFull(vOut) + '</span> — ' + t("legend_outflow") + '</div>');
        });
        hit.addEventListener("pointerleave", hideTooltip);
        svg.appendChild(hit);
        if (dates.length <= 14 || i % Math.ceil(dates.length / 10) === 0) {
          var xlbl = svgEl("text", { class: "axis-label", x: gx, y: H - 8, "text-anchor": "middle" });
          xlbl.textContent = fmtAxisDM(d, multiYear);
          svg.appendChild(xlbl);
        }
      });
    }
    wrap.appendChild(svg);

    var totalIn = dates.reduce(function (a, d) { return a + (dayMap[d].inflow || 0); }, 0);
    var totalOut = dates.reduce(function (a, d) { return a + (dayMap[d].outflow || 0); }, 0);
    if (subId) {
      document.getElementById(subId).textContent = dates.length + " " + t("days_word") + " · " +
        t("legend_inflow") + " " + moneyFull(totalIn) + " · " + t("legend_outflow") + " " + moneyFull(totalOut);
    }
    renderTable(tableId, ["—", t("legend_inflow"), t("legend_outflow")], dates.map(function (d) {
      return [fmtDateDMY(d), moneyFull(dayMap[d].inflow || 0), moneyFull(dayMap[d].outflow || 0)];
    }));
  }

  // ================= diverging account bar chart (fixed value column — no collisions) =================
  function renderAccountChart(wrapId, accounts) {
    var wrap = document.getElementById(wrapId);
    wrap.innerHTML = "";
    if (!accounts || accounts.length === 0) {
      wrap.innerHTML = '<div class="empty">' + t("empty_category") + '</div>';
      return;
    }
    var W = 1000, rowH = 34, padL = 220, valColW = 110, padR = 14, padT = 10, padB = 10;
    var plotW = W - padL - valColW - padR;
    var H = padT + padB + rowH * accounts.length;
    var maxAbs = niceMax(Math.max.apply(null, accounts.map(function (a) { return Math.abs(a.amount); }).concat([1])));
    var mid = padL + plotW / 2;
    var scale = (plotW / 2) / maxAbs;
    var valColX = padL + plotW + 14;

    var svg = svgEl("svg", { class: "chart", viewBox: "0 0 " + W + " " + H, preserveAspectRatio: "xMidYMid meet" });
    svg.appendChild(svgEl("line", { class: "baseline-line", x1: mid, x2: mid, y1: padT, y2: H - padB }));

    accounts.forEach(function (a, i) {
      var cy = padT + rowH * i + rowH / 2, barH = 16;
      var w = Math.abs(a.amount) * scale;
      var x = a.amount >= 0 ? mid : mid - w;
      var color = a.amount >= 0 ? "var(--diverging-pos)" : "var(--diverging-neg)";

      var lbl = svgEl("text", { class: "axis-label", x: padL - 10, y: cy + 4, "text-anchor": "end" });
      lbl.setAttribute("fill", "var(--text-secondary)");
      lbl.textContent = a.account + " — " + a.name;
      svg.appendChild(lbl);

      svg.appendChild(svgEl("rect", { class: "bar", x: x, y: cy - barH / 2, width: Math.max(w, 1), height: barH, rx: 3, fill: color }));

      // value always in its own fixed right-hand column — never collides with the row label or the bar
      var valLbl = svgEl("text", { class: "axis-label", x: valColX, y: cy + 4, "text-anchor": "start" });
      valLbl.setAttribute("fill", "var(--text-primary)");
      valLbl.textContent = money(a.amount);
      svg.appendChild(valLbl);

      var hit = svgEl("rect", { x: padL, y: cy - rowH / 2, width: plotW, height: rowH, fill: "transparent" });
      hit.addEventListener("pointermove", function (e) {
        showTooltip(e.pageX, e.pageY, '<div>' + a.account + " — " + a.name + '</div><div class="t-val">' + moneyFull(a.amount) + '</div>');
      });
      hit.addEventListener("pointerleave", hideTooltip);
      svg.appendChild(hit);
    });
    wrap.appendChild(svg);
  }

      endpoint: "/sales", cacheKey: "sales", color: "var(--series-1)", legendKey: "legend_sales",
      totalId: "sotuvTotal", docsId: "sotuvDocs", avgId: "sotuvAvg",

      monthPickId: "xaridlarMonthPick"
    }
  };
  var pageState = {

    xaridlar: { view: "chart", period: "day" }
  };
  var monthCache = { sotuv: {}, xaridlar: {} };

  function monthBounds(ym) {
    var parts = ym.split("-");
    var y = parseInt(parts[0], 10), m = parseInt(parts[1], 10);
    var first = new Date(y, m - 1, 1);
    var last = new Date(y, m, 0);
    return { from: fmtDate(first), to: fmtDate(last) };
  }

  function ensureMonthData(page, ym) {
    if (!ym) return Promise.resolve();
    if (monthCache[page][ym]) return Promise.resolve();
    var conf = SALES_PAGES[page];
    var b = monthBounds(ym);
    return apiGet(conf.endpoint + "?date_from=" + b.from + "&date_to=" + b.to).then(function (data) {
      monthCache[page][ym] = data;
    }).catch(function (err) {
      showError(t("err_load") + ": " + err.message + " — " + t("err_hint"));
    });
  }

  function getPageData(page) {
    var st = pageState[page];
    if (st.period === "month") {
      var ym = document.getElementById(SALES_PAGES[page].monthPickId).value;
      return monthCache[page][ym] || null;
    }
    return cache[SALES_PAGES[page].cacheKey];
  }

    document.getElementById(conf.docsId).textContent = docs;

    var chartWrapEl = document.getElementById(conf.chartWrap);

      tableWrapEl.classList.remove("show");
      renderDayChart(conf.chartWrap, conf.chartSub, conf.tableWrap, t(conf.legendKey), conf.color, days);
    } else {
      chartWrapEl.style.display = "none";
      tableWrapEl.classList.add("show");
      renderSalesTable(conf.tableWrap, t(conf.legendKey), days);
      document.getElementById(conf.chartSub).textContent = days.length + " " + t("days_word") + " · " + moneyFull(data.total_amount);
    }
  }

  document.querySelectorAll(".view-switch").forEach(function (sw) {
    sw.addEventListener("click", function (e) {
      var btn = e.target.closest(".seg-btn");
      if (!btn) return;
      var page = sw.getAttribute("data-page");
      pageState[page].view = btn.getAttribute("data-view");
      sw.querySelectorAll(".seg-btn").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      renderSalesPage(page);
    });
  });

  document.querySelectorAll(".period-row").forEach(function (row) {
    var page = row.getAttribute("data-page");
    var monthPick = row.querySelector(".month-pick");
    row.querySelector(".period-switch").addEventListener("click", function (e) {
      var btn = e.target.closest(".seg-btn");
      if (!btn) return;
      var mode = btn.getAttribute("data-period");
      pageState[page].period = mode;
      row.querySelectorAll(".seg-btn").forEach(function (b) { b.classList.remove("active"); });
      btn.classList.add("active");
      monthPick.classList.toggle("hide", mode !== "month");
      if (mode === "month") {
        ensureMonthData(page, monthPick.value).then(function () { renderSalesPage(page); });
      } else {
        renderSalesPage(page);
      }
    });
    monthPick.addEventListener("change", function () {
      ensureMonthData(page, monthPick.value).then(function () { renderSalesPage(page); });
    });
  });

  // ================= data cache =================
  var cache = { sales: null, expenses: null, balance: null, finresult: null, bankflow: null, monthlyreport: null };

  function renderPage(name) {
    if (!cache.sales) return;
    var accounts = (cache.balance && cache.balance.accounts) || [];

    if (name === "bank") {
      var bf = cache.bankflow || { total_inflow: 0, total_outflow: 0, days: [] };
      document.getElementById("bankInflow").textContent = money(bf.total_inflow);
      document.getElementById("bankOutflow").textContent = money(bf.total_outflow);
      var net = (bf.total_inflow || 0) - (bf.total_outflow || 0);
      var netEl = document.getElementById("bankNet");
      netEl.textContent = money(net);
      netEl.className = "value " + (net >= 0 ? "good" : "critical");
      renderFlowChart("bankFlowWrap", "bankFlowSub", "bankFlowTableWrap", bf.days || []);
      renderAccountChart("bankWrap", filterAccounts(accounts, ["50", "51", "52", "55"]));
    }
    else if (name === "sklad") renderAccountChart("skladWrap", filterAccounts(accounts, ["10", "41", "43", "45"]));
    else if (name === "ishlab") renderAccountChart("ishlabWrap", filterAccounts(accounts, ["20", "23", "25", "26"]));
    else if (name === "vositalar") renderAccountChart("vositalarWrap", filterAccounts(accounts, ["01", "02", "04", "05", "08"]));
    else if (name === "zarplata") renderAccountChart("zarplataWrap", filterAccounts(accounts, ["70"]));
    else if (name === "sotuv") renderSalesPage("sotuv");
    else if (name === "xaridlar") renderSalesPage("xaridlar");
    else if (name === "hisobotlar") {
      var fr = cache.finresult;
      document.getElementById("hrRevenue").textContent = money(fr.revenue);
      document.getElementById("hrCogs").textContent = money(fr.cogs);
      var hrP = document.getElementById("hrProfit");
      hrP.textContent = money(fr.profit);
      hrP.className = "value " + (fr.profit >= 0 ? "good" : "critical");
      document.getElementById("hrSub").textContent = reportPeriodLabel();
      renderReportBars("hrChartWrap", [
        { label: t("kpi_revenue"), val: fr.revenue || 0, color: "var(--series-1)" },
        { label: t("kpi_cogs"), val: fr.cogs || 0, color: "var(--series-2)" },
        { label: t("kpi_profit"), val: fr.profit || 0, color: (fr.profit || 0) >= 0 ? "var(--diverging-pos)" : "var(--diverging-neg)" }
      ]);
      document.getElementById("hrMonthlySub").textContent = reportPeriod.year;
      if (cache.monthlyreport) renderMonthlyReportTable("hrMonthlyTableWrap", cache.monthlyreport);
    }
  }

  // ================= Hisobotlar: full-year monthly breakdown table =================
  var MONTHLY_REPORT_FLOW_COLS = [
    { key: "sales", label: "legend_sales" }, { key: "fx_income", label: "hr_fx_income" },
    { key: "interest_income", label: "hr_interest_income" }, { key: "other_income", label: "hr_other_income" },
    { key: "cogs", label: "kpi_cogs" }, { key: "selling_expenses", label: "hr_selling_exp" },
    { key: "admin", label: "hr_admin" }, { key: "other_expenses", label: "hr_other_exp" },
    { key: "disposal_expenses", label: "hr_disposal_exp" }, { key: "interest_expense", label: "hr_interest_exp" },
    { key: "fx_loss", label: "hr_fx_loss" }, { key: "remuneration_expense", label: "hr_remuneration_exp" },
    { key: "other_fin_expenses", label: "hr_other_fin" }, { key: "tax", label: "hr_tax" },
    { key: "other_taxes", label: "hr_other_taxes" }
  ];
  function renderMonthlyReportTable(containerId, data) {
    var c = document.getElementById(containerId);
    if (!c) return;
    var headers = [t("filter_period")].concat(MONTHLY_REPORT_FLOW_COLS.map(function (col) { return t(col.label); }))
      .concat([t("hr_tax_estimate"), t("kpi_profit")]);
    var tbl = document.createElement("table");
    tbl.className = "data-table";
    var thead = document.createElement("thead"), trh = document.createElement("tr");
    headers.forEach(function (h) { var th = document.createElement("th"); th.textContent = h; trh.appendChild(th); });
    thead.appendChild(trh); tbl.appendChild(thead);
    var tbody = document.createElement("tbody");
    var totals = {};
    MONTHLY_REPORT_FLOW_COLS.forEach(function (col) { totals[col.key] = 0; });
    data.months.forEach(function (m) {
      var tr = document.createElement("tr");
      var monthTd = document.createElement("td");
      monthTd.textContent = MONTH_NAMES[lang][m.month - 1];
      tr.appendChild(monthTd);
      MONTHLY_REPORT_FLOW_COLS.forEach(function (col) {
        var td = document.createElement("td");
        td.textContent = moneyFull(m[col.key]);
        tr.appendChild(td);
        totals[col.key] += (m[col.key] || 0);
      });
      var tdTax = document.createElement("td");
      tdTax.textContent = moneyFull(m.tax_estimate);
      tr.appendChild(tdTax);
      var tdProfit = document.createElement("td");
      tdProfit.textContent = moneyFull(m.profit);
      tdProfit.className = m.profit >= 0 ? "good" : "critical";
      tr.appendChild(tdProfit);
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    var tfoot = document.createElement("tfoot"), trf = document.createElement("tr");
    var lastMonth = data.months[data.months.length - 1];
    var footCells = [t("row_total")].concat(MONTHLY_REPORT_FLOW_COLS.map(function (col) { return moneyFull(totals[col.key]); }))
      .concat([moneyFull(lastMonth ? lastMonth.tax_estimate : 0), moneyFull(lastMonth ? lastMonth.profit : 0)]);
    footCells.forEach(function (cell) {
      var td = document.createElement("td"); td.textContent = cell; trf.appendChild(td);
    });
    tfoot.appendChild(trf); tbl.appendChild(tfoot);
    c.innerHTML = ""; c.appendChild(tbl);
  }

  // ================= main load =================
  function loadAll() {
    clearError();
    var dFrom = dateFromEl.value, dTo = dateToEl.value;
    var rp = reportPeriodBounds();
    Promise.all([
      apiGet("/sales?date_from=" + dFrom + "&date_to=" + dTo),
      apiGet("/expenses?date_from=" + dFrom + "&date_to=" + dTo),
      apiGet("/balance?on_date=" + rp.to),
      apiGet("/finresult?date_from=" + rp.from + "&date_to=" + rp.to),
      apiGet("/bankflow?date_from=" + dFrom + "&date_to=" + dTo),
      apiGet("/monthlyreport?year=" + reportPeriod.year)
    ]).then(function (res) {
      cache.sales = res[0]; cache.expenses = res[1]; cache.balance = res[2]; cache.finresult = res[3]; cache.bankflow = res[4]; cache.monthlyreport = res[5];
      renderPage(currentPage());
    }).catch(function (err) {
      showError(t("err_load") + ": " + err.message + " — " + t("err_hint"));
    });
  }

  document.getElementById("refreshBtn").addEventListener("click", loadAll);

  applyI18n();
  setActivePage(currentPage());
  if (!cfg.user || !cfg.pass) {
    document.getElementById("cfgBase").value = cfg.base;
    document.getElementById("cfgUser").value = cfg.user;
    document.getElementById("cfgPass").value = cfg.pass;
    settingsPanel.classList.add("show");
  } else {
    loadAll();
  }
})();
</script>
</body>
</html>
